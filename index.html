<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Playing-Cards</title>
</head>
<body>
    <main id="playing-cards">
        <div class="card">
            <div class="left">
                <div class="container">
                    <div class="un">A</div> <div class="i1">&spades;</div>
                </div>
            </div>
            <div class="middle">
                <div class="one-spade">&spades;</div>
            </div>
            <div class="right">
                <div class="container">
                    <div class="un">A</div> <div class="i1">&spades;</div>
                </div>
            </div>
        </div>


        <div class="card">
            <div class="left">
                <div class="container">
                    <div class="deux">2</div> <div class="i2">&clubs;</div>
                </div>
            </div>
            <div class="middle">
                <div class="club club-one">&clubs;</div>
                <div class="club club-two">&clubs;</div>
            </div>
            <div class="right">
                <div class="container">
                    <div class="deux">2</div> <div class="i2">&clubs;</div>
                </div>
            </div>
        </div>


        <div class="card">
            <div class="left">
                <div class="container">
                    <div class="trois">3</div> <div class="i3">&hearts;</div>
                </div>
            </div>
            <div class="middle">
                <div class="heart heart-one">&hearts;</div>
                <div class="heart heart-two">&hearts;</div>
                <div class="heart heart-three">&hearts;</div>
            </div>
            <div class="right">
                <div class="container">
                    <div class="trois">3</div> <div class="i3">&hearts;</div>
                </div>
            </div>
        </div>


        <div class="card">
            <div class="left">
                <div class="container">
                    <div class="qutre">4</div> <div class="i4">&clubs;</div>
                </div>
            </div>
            <div class="middle">
                <div class="club club-one">&clubs;&clubs;</div>
                <div class="club club-two">&clubs;&clubs;</div>
            </div>
            <div class="right">
                <div class="container">
                    <div class="quatre">4</div> <div class="i4">&clubs;</div>
                </div>
            </div>
        </div>


        <div class="card">
            <div class="left">
                <div class="container">
                    <div class="trois">3</div> <div class="i5">&diams;</div>
                </div>
            </div>
            <div class="middle">
                <div class="diams diams-one">&diams;&diams;</div>
                <div class="diams diams-two">&diams;</div>
                <div class="diams diams-three">&diams;&diams;</div>
            </div>
            <div class="right">
                <div class="container">
                    <div class="trois">5</div> <div class="i5">&diams;</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
